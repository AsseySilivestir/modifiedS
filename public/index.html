<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="modifiedS — interactive learning platform with AI tutor, roadmaps, notes and progress tracking. Powered by Bantu + Sua + SQLite." />
  <title>modifiedS — Learn Anything, Step by Step</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- ─── Top nav ──────────────────────────────────────────────── -->
  <header class="topnav" id="topnav">
    <div class="topnav-inner">
      <a href="#/" class="brand" aria-label="modifiedS home">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="7" fill="url(#bg)"/>
          <path d="M8 19V9l6 5 6-5v10" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="bg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient></defs>
        </svg>
        <span>modifiedS</span>
      </a>

      <nav class="nav-links" id="nav-links">
        <a href="#/roadmaps">Roadmaps</a>
        <a href="#/courses">Courses</a>
        <a href="#/community">Community</a>
        <a href="#/announcements">Announcements</a>
        <a href="#/certificates">Certificates</a>
        <a href="#/tutor">AI Tutor</a>
        <a href="#/notes">Notes</a>
        <a href="#/admin" id="nav-admin-link" style="display:none">Admin</a>
      </nav>

      <div class="nav-actions" id="nav-actions">
        <!-- Filled by JS: either Login/Register buttons or user avatar menu -->
      </div>
    </div>
  </header>

  <!-- ─── Main view container (SPA renders here) ──────────────── -->
  <main id="view" class="view" role="main">
    <div class="loading-skeleton">Loading…</div>
  </main>

  <!-- ─── Mobile bottom nav ───────────────────────────────────── -->
  <nav class="bottomnav" id="bottomnav" aria-label="Mobile navigation">
    <a href="#/roadmaps"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h12"/></svg><span>Roadmaps</span></a>
    <a href="#/courses"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg><span>Courses</span></a>
    <a href="#/community"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Community</span></a>
    <a href="#/certificates"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.5 13.5L17 22l-5-3-5 3 1.5-8.5"/></svg><span>Certificates</span></a>
  </nav>

  <!-- ─── Toast notifications ─────────────────────────────────── -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- ─── Modal root (for auth, confirm dialogs) ──────────────── -->
  <div id="modal-root" class="modal-root" aria-hidden="true"></div>

  <!-- ─── App script ──────────────────────────────────────────── -->
  <script src="/app.js" defer></script>
</body>
</html>
