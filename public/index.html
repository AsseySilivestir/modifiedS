<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="modifiedS — interactive learning platform with AI tutor, roadmaps, notes and progress tracking. Powered by Bantu + Sua + SQLite." />
  <title>modifiedS — Learn Anything, Step by Step</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- ─── Top nav ──────────────────────────────────────────────── -->
  <header class="topnav" id="topnav">
    <div class="topnav-inner">
      <a href="#/" class="brand" aria-label="modifiedS home">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="7" fill="url(#bg)"/>
          <path d="M8 19V9l6 5 6-5v10" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="bg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient></defs>
        </svg>
        <span>modifiedS</span>
      </a>

      <nav class="nav-links" id="nav-links">
        <a href="#/roadmaps">Roadmaps</a>
        <a href="#/tutor">AI Tutor</a>
        <a href="#/notes">Notes</a>
        <a href="#/progress">My Progress</a>
      </nav>

      <div class="nav-actions" id="nav-actions">
        <!-- Filled by JS: either Login/Register buttons or user avatar menu -->
      </div>
    </div>
  </header>

  <!-- ─── Main view container (SPA renders here) ──────────────── -->
  <main id="view" class="view" role="main">
    <div class="loading-skeleton">Loading…</div>
  </main>

  <!-- ─── Mobile bottom nav ───────────────────────────────────── -->
  <nav class="bottomnav" id="bottomnav" aria-label="Mobile navigation">
    <a href="#/roadmaps"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h12"/></svg><span>Roadmaps</span></a>
    <a href="#/tutor"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span>Tutor</span></a>
    <a href="#/notes"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Notes</span></a>
    <a href="#/progress"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Progress</span></a>
  </nav>

  <!-- ─── Toast notifications ─────────────────────────────────── -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- ─── Modal root (for auth, confirm dialogs) ──────────────── -->
  <div id="modal-root" class="modal-root" aria-hidden="true"></div>

  <!-- ─── App script ──────────────────────────────────────────── -->
  <script src="/app.js" defer></script>
</body>
</html>
