/* ============================================================================
   modifiedS — Design System
   A modern, education-focused theme with light + dark mode.
   Pure CSS, no framework. Mobile-first with desktop enhancements.
   ============================================================================ */

/* ─── Tokens ────────────────────────────────────────────────────────── */
:root {
  /* Brand */
  --brand-500: #6366f1;
  --brand-600: #4f46e5;
  --brand-700: #4338ca;
  --accent-500: #8b5cf6;
  --accent-600: #7c3aed;

  /* Status */
  --ok: #10b981;
  --ok-bg: #ecfdf5;
  --ok-border: #a7f3d0;
  --warn: #f59e0b;
  --warn-bg: #fffbeb;
  --warn-border: #fde68a;
  --err: #ef4444;
  --err-bg: #fef2f2;
  --err-border: #fecaca;
  --info: #3b82f6;
  --info-bg: #eff6ff;
  --info-border: #bfdbfe;

  /* Light theme surfaces */
  --bg: #fafafa;
  --bg-elev: #ffffff;
  --bg-muted: #f4f4f5;
  --card: #ffffff;
  --card-hover: #fafafa;
  --border: #e4e4e7;
  --border-strong: #d4d4d8;
  --text: #18181b;
  --text-muted: #71717a;
  --text-soft: #a1a1aa;

  /* Difficulty colors */
  --beg: #10b981;
  --int: #f59e0b;
  --adv: #ef4444;

  /* Layout */
  --max-w: 1180px;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 18px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.05);
  --transition: 160ms cubic-bezier(0.4, 0, 0.2, 1);

  --topnav-h: 64px;
  --bottomnav-h: 0px;
}

@media (max-width: 720px) {
  :root { --bottomnav-h: 64px; }
}

/* ─── Dark mode (auto) ─────────────────────────────────────────────── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0a0a0b;
    --bg-elev: #18181b;
    --bg-muted: #27272a;
    --card: #18181b;
    --card-hover: #1f1f23;
    --border: #27272a;
    --border-strong: #3f3f46;
    --text: #fafafa;
    --text-muted: #a1a1aa;
    --text-soft: #71717a;

    --ok-bg: rgba(16,185,129,0.12);
    --ok-border: rgba(16,185,129,0.3);
    --warn-bg: rgba(245,158,11,0.12);
    --warn-border: rgba(245,158,11,0.3);
    --err-bg: rgba(239,68,68,0.12);
    --err-border: rgba(239,68,68,0.3);
    --info-bg: rgba(59,130,246,0.12);
    --info-border: rgba(59,130,246,0.3);

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
    --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.6);
  }
}

/* Also support manual override via [data-theme] */
[data-theme="dark"] {
  --bg: #0a0a0b;
  --bg-elev: #18181b;
  --bg-muted: #27272a;
  --card: #18181b;
  --card-hover: #1f1f23;
  --border: #27272a;
  --border-strong: #3f3f46;
  --text: #fafafa;
  --text-muted: #a1a1aa;
  --text-soft: #71717a;
  --ok-bg: rgba(16,185,129,0.12);
  --ok-border: rgba(16,185,129,0.3);
  --warn-bg: rgba(245,158,11,0.12);
  --warn-border: rgba(245,158,11,0.3);
  --err-bg: rgba(239,68,68,0.12);
  --err-border: rgba(239,68,68,0.3);
  --info-bg: rgba(59,130,246,0.12);
  --info-border: rgba(59,130,246,0.3);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.6);
}

/* ─── Reset ────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
               "Helvetica Neue", Arial, "Noto Sans", sans-serif;
  font-size: 15px;
  line-height: 1.6;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding-bottom: var(--bottomnav-h);
}
img, svg { display: block; max-width: 100%; }
a { color: var(--brand-600); text-decoration: none; transition: color var(--transition); }
a:hover { color: var(--brand-700); }
button { font: inherit; cursor: pointer; }
h1, h2, h3, h4, h5 { margin: 0 0 0.4em; line-height: 1.25; font-weight: 700; color: var(--text); }
h1 { font-size: clamp(28px, 4vw, 40px); }
h2 { font-size: clamp(22px, 3vw, 28px); }
h3 { font-size: 18px; }
p  { margin: 0 0 1em; }
ul, ol { margin: 0 0 1em; padding-left: 1.2em; }
small { color: var(--text-muted); }
code, pre {
  font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  font-size: 13px;
}
pre {
  background: var(--bg-muted);
  border: 1px solid var(--border);
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  overflow-x: auto;
}
hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }

/* ─── Top nav ──────────────────────────────────────────────────────── */
.topnav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in srgb, var(--bg-elev) 88%, transparent);
  backdrop-filter: saturate(180%) blur(10px);
  -webkit-backdrop-filter: saturate(180%) blur(10px);
  border-bottom: 1px solid var(--border);
}
.topnav-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  height: var(--topnav-h);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 24px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 17px;
  color: var(--text);
  letter-spacing: -0.01em;
}
.brand:hover { color: var(--brand-600); }
.nav-links {
  display: flex;
  gap: 4px;
  margin-right: auto;
}
.nav-links a {
  color: var(--text-muted);
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-weight: 500;
  font-size: 14px;
  transition: background var(--transition), color var(--transition);
}
.nav-links a:hover { background: var(--bg-muted); color: var(--text); }
.nav-links a.active { color: var(--brand-600); background: var(--bg-muted); }

.nav-actions { display: flex; align-items: center; gap: 8px; }

/* User menu */
.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px 5px 5px;
  background: var(--bg-muted);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  transition: background var(--transition);
}
.user-chip:hover { background: var(--card-hover); }
.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand-500), var(--accent-500));
  color: #fff;
  display: grid;
  place-items: center;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
}

/* ─── Mobile bottom nav ────────────────────────────────────────────── */
.bottomnav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--bottomnav-h);
  background: var(--bg-elev);
  border-top: 1px solid var(--border);
  z-index: 50;
}
.bottomnav a {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 500;
  padding: 8px 4px;
  transition: color var(--transition);
}
.bottomnav a.active { color: var(--brand-600); }
@media (max-width: 720px) {
  .bottomnav { display: flex; }
  .nav-links { display: none; }
}

/* ─── View container ───────────────────────────────────────────────── */
.view {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 32px 20px 64px;
  min-height: calc(100vh - var(--topnav-h) - var(--bottomnav-h));
}
.view.narrow { max-width: 720px; }
.view.wide { max-width: 100%; padding-left: 24px; padding-right: 24px; }

@media (max-width: 720px) {
  .view { padding: 20px 16px 80px; }
}

/* ─── Buttons ──────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 9px 16px;
  background: var(--brand-600);
  color: #fff;
  border: 1px solid var(--brand-600);
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  transition: background var(--transition), border-color var(--transition), transform var(--transition);
  user-select: none;
}
.btn:hover { background: var(--brand-700); border-color: var(--brand-700); }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.55; cursor: not-allowed; }
.btn-secondary {
  background: var(--bg-elev);
  color: var(--text);
  border-color: var(--border-strong);
}
.btn-secondary:hover { background: var(--bg-muted); border-color: var(--text-soft); }
.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border-color: transparent;
}
.btn-ghost:hover { background: var(--bg-muted); color: var(--text); }
.btn-danger {
  background: var(--err);
  border-color: var(--err);
  color: #fff;
}
.btn-danger:hover { background: #dc2626; border-color: #dc2626; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-lg { padding: 12px 22px; font-size: 15px; }
.btn-block { display: flex; width: 100%; }

/* ─── Forms ────────────────────────────────────────────────────────── */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  color: var(--text);
  font: inherit;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: 0;
  border-color: var(--brand-500);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand-500) 22%, transparent);
}
.field textarea { min-height: 120px; resize: vertical; }
.field-hint { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
.field-error { color: var(--err); font-size: 12px; margin-top: 4px; }

/* ─── Cards ────────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition);
}
.card.hoverable:hover {
  box-shadow: var(--shadow);
  border-color: var(--border-strong);
  transform: translateY(-2px);
}
.card-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.card-sub { color: var(--text-muted); font-size: 13px; }

/* ─── Hero (landing) ───────────────────────────────────────────────── */
.hero {
  text-align: center;
  padding: 64px 0 48px;
}
.hero h1 {
  font-size: clamp(34px, 5.5vw, 56px);
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--text) 0%, var(--brand-600) 60%, var(--accent-600) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero p.lead {
  font-size: clamp(16px, 2vw, 19px);
  color: var(--text-muted);
  max-width: 640px;
  margin: 0 auto 28px;
}
.hero-cta {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

/* ─── Grids ────────────────────────────────────────────────────────── */
.grid {
  display: grid;
  gap: 16px;
}
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-auto { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
@media (max-width: 900px) {
  .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .grid-2, .grid-3, .grid-4, .grid-auto { grid-template-columns: 1fr; }
}

/* ─── Roadmap card ─────────────────────────────────────────────────── */
.rm-card {
  display: flex;
  flex-direction: column;
  padding: 18px;
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
}
.rm-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--rm-color, var(--brand-500));
}
.rm-card .rm-icon {
  font-size: 26px;
  margin-bottom: 10px;
}
.rm-card .rm-title {
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 4px;
  color: var(--text);
}
.rm-card .rm-desc {
  color: var(--text-muted);
  font-size: 13px;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.rm-card .rm-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 12px;
  color: var(--text-muted);
  margin-top: auto;
}

/* ─── Badges & pills ───────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  background: var(--bg-muted);
  color: var(--text-muted);
}
.badge.beg { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok-border); }
.badge.int { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
.badge.adv { background: var(--err-bg); color: var(--err); border: 1px solid var(--err-border); }
.badge.brand { background: var(--info-bg); color: var(--info); border: 1px solid var(--info-border); }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 999px;
  background: var(--bg-muted);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
}
.chip:hover { background: var(--card-hover); }
.chip.active {
  background: var(--brand-600);
  color: #fff;
  border-color: var(--brand-600);
}

/* ─── Section header ───────────────────────────────────────────────── */
.section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 16px;
  flex-wrap: wrap;
}
.section-head h2 { margin: 0; }
.section-head .sub { color: var(--text-muted); font-size: 14px; margin: 4px 0 0; }

/* ─── Filter bar ───────────────────────────────────────────────────── */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.search-input {
  flex: 1;
  min-width: 200px;
  padding: 9px 14px;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  color: var(--text);
  font: inherit;
}
.search-input:focus {
  outline: 0;
  border-color: var(--brand-500);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand-500) 22%, transparent);
}

/* ─── Roadmap detail header ────────────────────────────────────────── */
.rm-hero {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.rm-hero::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: var(--rm-color, var(--brand-500));
}
.rm-hero .rm-hero-icon {
  font-size: 44px;
  margin-bottom: 12px;
}
.rm-hero h1 { margin-bottom: 8px; }
.rm-hero .lead { color: var(--text-muted); font-size: 16px; margin-bottom: 16px; max-width: 720px; }
.rm-hero-meta {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 14px;
}
.rm-hero-meta span { display: inline-flex; align-items: center; gap: 5px; }

/* ─── Topic list (roadmap detail) ──────────────────────────────────── */
.topic-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  text-decoration: none;
  color: inherit;
  transition: border-color var(--transition), background var(--transition);
}
.topic-row:hover { border-color: var(--brand-500); background: var(--card-hover); }
.topic-row .ord {
  width: 34px; height: 34px;
  flex-shrink: 0;
  border-radius: 50%;
  background: var(--bg-muted);
  color: var(--text-muted);
  display: grid;
  place-items: center;
  font-weight: 700;
  font-size: 13px;
}
.topic-row.done .ord { background: var(--ok); color: #fff; }
.topic-row .title { font-weight: 600; }
.topic-row .meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ─── Item viewer (lesson) ─────────────────────────────────────────── */
.lesson {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.lesson h1 { margin-bottom: 8px; }
.lesson-meta { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
.lesson-body { font-size: 15px; line-height: 1.7; }
.lesson-body p { margin: 0 0 1em; }
.lesson-body code { background: var(--bg-muted); padding: 2px 6px; border-radius: 4px; }
.lesson-actions {
  display: flex;
  gap: 10px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

/* ─── Progress bar ─────────────────────────────────────────────────── */
.progress-bar {
  height: 8px;
  background: var(--bg-muted);
  border-radius: 999px;
  overflow: hidden;
}
.progress-bar > span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, var(--brand-500), var(--accent-500));
  border-radius: 999px;
  transition: width 400ms ease;
}

/* ─── Notes ────────────────────────────────────────────────────────── */
.note-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  transition: border-color var(--transition), box-shadow var(--transition);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.note-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
.note-card .note-title { font-weight: 700; font-size: 15px; }
.note-card .note-body {
  color: var(--text-muted);
  font-size: 13px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.note-card .note-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--text-soft);
  margin-top: 6px;
}
.note-card .note-actions { display: flex; gap: 6px; }

/* ─── AI Tutor chat ────────────────────────────────────────────────── */
.tutor-wrap {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
}
@media (max-width: 900px) {
  .tutor-wrap { grid-template-columns: 1fr; }
}
.chat-window {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  height: calc(100vh - var(--topnav-h) - var(--bottomnav-h) - 100px);
  min-height: 480px;
  overflow: hidden;
}
.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.msg.user {
  align-self: flex-end;
  background: var(--brand-600);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.bot {
  align-self: flex-start;
  background: var(--bg-muted);
  color: var(--text);
  border-bottom-left-radius: 4px;
}
.msg .role {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
  opacity: 0.7;
}
.chat-input {
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  display: flex;
  gap: 8px;
}
.chat-input textarea {
  flex: 1;
  resize: none;
  padding: 10px 12px;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  color: var(--text);
  font: inherit;
  min-height: 44px;
  max-height: 120px;
}
.chat-input textarea:focus {
  outline: 0;
  border-color: var(--brand-500);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand-500) 22%, transparent);
}

.tutor-sidebar h3 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.suggest-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 22px;
}
.suggest-item {
  padding: 10px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.suggest-item:hover {
  border-color: var(--brand-500);
  background: var(--card-hover);
}

/* ─── Stat cards ───────────────────────────────────────────────────── */
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--brand-500), var(--accent-500));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.stat-card .stat-label {
  color: var(--text-muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 4px;
}

/* ─── Empty state ──────────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.6; }
.empty h3 { color: var(--text); margin-bottom: 6px; }

/* ─── Loading ──────────────────────────────────────────────────────── */
.loading-skeleton {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
  color: var(--text-muted);
  font-size: 14px;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--brand-500);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Toast ────────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: var(--bg-elev);
  padding: 11px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  opacity: 0;
  transition: transform 260ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 260ms;
  pointer-events: none;
  max-width: 90vw;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.error { background: var(--err); color: #fff; }
.toast.success { background: var(--ok); color: #fff; }

@media (max-width: 720px) {
  .toast { bottom: calc(var(--bottomnav-h) + 12px); }
}

/* ─── Modal ────────────────────────────────────────────────────────── */
.modal-root {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-root.show { display: flex; }
.modal {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  max-width: 440px;
  width: 100%;
  box-shadow: var(--shadow-lg);
}
.modal h2 { margin-bottom: 6px; }
.modal p.sub { color: var(--text-muted); margin-bottom: 20px; font-size: 14px; }
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}

/* ─── Auth forms ───────────────────────────────────────────────────── */
.auth-card {
  max-width: 420px;
  margin: 32px auto;
  padding: 32px;
}
.auth-card h1 { font-size: 26px; text-align: center; margin-bottom: 6px; }
.auth-card .sub { text-align: center; color: var(--text-muted); margin-bottom: 24px; }
.auth-tabs {
  display: flex;
  background: var(--bg-muted);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 22px;
}
.auth-tabs button {
  flex: 1;
  background: transparent;
  border: 0;
  padding: 9px;
  border-radius: 6px;
  font-weight: 600;
  font-size: 14px;
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition);
}
.auth-tabs button.active {
  background: var(--bg-elev);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.auth-switch {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 16px;
}
.auth-switch a { font-weight: 600; }

/* ─── Profile ──────────────────────────────────────────────────────── */
.profile-header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 28px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
}
.profile-header .avatar-lg {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand-500), var(--accent-500));
  color: #fff;
  display: grid;
  place-items: center;
  font-size: 28px;
  font-weight: 800;
  text-transform: uppercase;
}
.profile-header h1 { font-size: 24px; margin-bottom: 4px; }
.profile-header .meta { color: var(--text-muted); font-size: 14px; }

/* ─── Markdown-ish content rendering ───────────────────────────────── */
.lesson-body h1 { font-size: 24px; margin: 1.2em 0 0.4em; }
.lesson-body h2 { font-size: 19px; margin: 1.2em 0 0.4em; }
.lesson-body ul, .lesson-body ol { padding-left: 1.4em; margin: 0.5em 0 1em; }
.lesson-body li { margin: 4px 0; }
.lesson-body blockquote {
  border-left: 3px solid var(--brand-500);
  padding: 4px 14px;
  background: var(--bg-muted);
  margin: 1em 0;
  color: var(--text-muted);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.lesson-body pre { margin: 1em 0; }

/* ─── Footer ───────────────────────────────────────────────────────── */
.footer {
  max-width: var(--max-w);
  margin: 40px auto 0;
  padding: 24px 20px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.footer a { color: var(--text-muted); }
.footer a:hover { color: var(--text); }

/* ─── Misc utilities ───────────────────────────────────────────────── */
.center { text-align: center; }
.mt-0 { margin-top: 0; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mt-3 { margin-top: 24px; }
.mb-0 { margin-bottom: 0; }
.mb-1 { margin-bottom: 8px; }
.mb-2 { margin-bottom: 16px; }
.mb-3 { margin-bottom: 24px; }
.flex { display: flex; }
.flex-1 { flex: 1; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 6px; }
.gap-2 { gap: 12px; }
.gap-3 { gap: 18px; }
.wrap { flex-wrap: wrap; }
.text-muted { color: var(--text-muted); }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11px; }
.hidden { display: none !important; }

/* ─── v1.1 — Courses, Community, Admin, Certificates ───────────────── */

.page-head { margin-bottom: 24px; }
.page-head h1 { font-size: 32px; margin: 0 0 6px; }
.page-head p { color: var(--text-muted); margin: 0; max-width: 60ch; }

.back-link { display: inline-block; color: var(--text-muted); font-size: 14px; margin-bottom: 16px; }
.back-link:hover { color: var(--brand-600); }

.section-title { font-size: 20px; margin: 32px 0 16px; }

.banner {
  background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(139,92,246,0.06));
  border: 1px solid rgba(99,102,241,0.2);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin: 16px 0;
  color: var(--text);
  font-size: 14px;
}
.banner a { color: var(--brand-600); font-weight: 600; }

/* ---- Course cards ---- */
.course-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 16px;
}
.course-card {
  display: flex; flex-direction: column;
  background: var(--card-bg, #fff);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}

.course-thumb {
  height: 110px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.92);
  font-size: 40px;
}
.course-thumb-emoji { font-size: 44px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18)); }
.course-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.course-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.course-body h3 { margin: 0; font-size: 17px; }
.course-desc { color: var(--text-muted); font-size: 13px; line-height: 1.5; margin: 0; flex: 1; }
.course-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); padding-top: 8px; border-top: 1px dashed var(--border); }

/* ---- Pills ---- */
.pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; background: var(--bg-muted); color: var(--text-muted); font-weight: 500; }
.pill-beg { background: #dcfce7; color: #166534; }
.pill-int { background: #fef3c7; color: #92400e; }
.pill-adv { background: #fee2e2; color: #991b1b; }
.pill-soft { background: rgba(99,102,241,0.1); color: var(--brand-700); }
.pill-success { background: #dcfce7; color: #166534; }

/* ---- Course detail ---- */
.course-hero {
  background: linear-gradient(135deg, color-mix(in srgb, var(--accent, #6366f1) 14%, transparent), color-mix(in srgb, var(--accent, #6366f1) 4%, transparent));
  border: 1px solid color-mix(in srgb, var(--accent, #6366f1) 30%, transparent);
  border-radius: 16px;
  padding: 24px 28px;
  margin-bottom: 20px;
}
.course-hero h1 { margin: 10px 0 8px; font-size: 28px; }
.course-hero-desc { color: var(--text-muted); margin: 0 0 14px; max-width: 70ch; }
.course-hero-meta { display: flex; flex-wrap: wrap; gap: 18px; font-size: 13px; color: var(--text-muted); }
.course-hero-tags { display: flex; gap: 8px; }

.course-actions { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
.progress-inline { display: flex; align-items: center; gap: 10px; flex: 1; max-width: 320px; }
.progress-bar { flex: 1; height: 8px; background: var(--bg-muted); border-radius: 999px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--brand-500), #8b5cf6); transition: width 0.3s ease; }
.progress-pct { font-size: 13px; font-weight: 600; min-width: 36px; }
.muted { color: var(--text-muted); font-size: 13px; }

.module-list { display: flex; flex-direction: column; gap: 10px; }
.module-item {
  background: var(--card-bg, #fff);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0;
  overflow: hidden;
}
.module-item summary { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 14px; font-weight: 500; list-style: none; }
.module-item summary::-webkit-details-marker { display: none; }
.module-item summary::before { content: '▸'; color: var(--text-muted); transition: transform 0.2s ease; }
.module-item[open] summary::before { transform: rotate(90deg); }
.module-num { color: var(--brand-600); font-weight: 700; font-variant-numeric: tabular-nums; min-width: 28px; }
.module-title { flex: 1; }
.module-content { padding: 0 16px 16px 58px; color: var(--text-muted); line-height: 1.6; }
.module-content p { margin: 6px 0; }

/* ---- Community / Thoughts ---- */
.thought-composer {
  display: flex; flex-direction: column; gap: 8px;
  background: var(--card-bg, #fff);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 24px;
}
.thought-input, .thought-tags {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: inherit;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  resize: vertical;
}
.thought-input:focus, .thought-tags:focus { outline: 2px solid var(--brand-500); outline-offset: -1px; border-color: var(--brand-500); }
.thought-composer .btn { align-self: flex-end; }

.thought-feed { display: flex; flex-direction: column; gap: 12px; }
.thought-card {
  background: var(--card-bg, #fff);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.thought-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.avatar-sm { width: 32px; height: 32px; font-size: 13px; }
.thought-meta { display: flex; flex-direction: column; line-height: 1.3; }
.thought-author { font-weight: 600; font-size: 14px; }
.thought-time { font-size: 12px; color: var(--text-muted); }
.thought-body { margin: 6px 0 10px; line-height: 1.55; white-space: pre-wrap; word-wrap: break-word; }
.thought-tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.thought-foot { display: flex; align-items: center; gap: 10px; padding-top: 8px; border-top: 1px dashed var(--border); }

/* ---- Announcements ---- */

.announcement-card {
  background: var(--card-bg, #fff);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
}
.announcement-card.pinned {
  border-color: color-mix(in srgb, var(--brand-500) 50%, var(--border));
  background: linear-gradient(135deg, color-mix(in srgb, var(--brand-500) 5%, transparent), var(--card-bg, #fff));
}

.announcement-time { color: var(--text-muted); margin-left: auto; }
.announcement-card h3 { margin: 6px 0 10px; font-size: 18px; }
.announcement-body { line-height: 1.6; color: var(--text); }
.announcement-body p { margin: 6px 0; }
.announcement-author { margin-top: 12px; font-size: 12px; color: var(--text-muted); font-style: italic; }

  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 20px;

  display: flex; flex-direction: column; align-items: center; gap: 8px;

  overflow: hidden;

  font-size: 22px;
  background: linear-gradient(135deg, color-mix(in srgb, var(--brand-500) 14%, transparent), transparent);

.cert-card h3 { margin: 4px 0; font-size: 16px; }
.cert-code { font-size: 11px; color: var(--text-muted); word-break: break-all; }
.cert-issued { font-size: 12px; color: var(--text-muted); }
.cert-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
.cert-badge-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  background: linear-gradient(135deg, #d4af37, #f4d160);
  color: #4f46e5;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.admin-section h3 { margin: 24px 0 12px; font-size: 15px; color: var(--text-muted); }
.admin-form { display: flex; flex-direction: column; gap: 12px; }

.admin-list { display: flex; flex-direction: column; gap: 8px; }
.admin-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--border);

/* ============================================================================
   modifiedS — SPA frontend
   Vanilla JS, no framework. Hash-routed. Talks to the Bantu + Sua backend.

   Structure:
     1. State + helpers
     2. API client
     3. Auth
     4. Router
     5. Views (home, roadmaps, roadmapDetail, topic, lesson, notes, tutor,
              progress, profile, login)
     6. Boot
   ============================================================================ */

'use strict';

/* ─── 1. State + helpers ───────────────────────────────────────────── */

const state = {
  user: null,
  token: null,
  roadmaps: null,        // cached list
  roadmapCache: new Map(),
  progressCache: null,
};

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') {
      e.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k === 'dataset') {
      for (const [dk, dv] of Object.entries(v)) e.dataset[dk] = dv;
    } else if (v !== null && v !== undefined) {
      e.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/** Render a tiny subset of markdown: headings, lists, bold, italic, code,
 *  blockquotes, paragraphs. Keeps the bundle minimal. */
function renderMarkdown(src) {
  if (!src) return '';
  const lines = String(src).split(/\r?\n/);
  const out = [];
  let inUl = false, inOl = false, inPre = false, preBuf = [];

  const inline = (s) =>
    s.replace(/`([^`]+)`/g, '<code>$1</code>')
     .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
     .replace(/\*([^*]+)\*/g, '<em>$1</em>')
     .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  const closeLists = () => {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
  };

  for (const raw of lines) {
    const line = raw;
    if (line.startsWith('```')) {
      if (inPre) {
        out.push('<pre><code>' + escapeHtml(preBuf.join('\n')) + '</code></pre>');
        preBuf = [];
        inPre = false;
      } else {
        closeLists();
        inPre = true;
      }
      continue;
    }
    if (inPre) { preBuf.push(line); continue; }

    if (/^###\s+/.test(line))      { closeLists(); out.push('<h3>' + inline(line.slice(4)) + '</h3>'); }
    else if (/^##\s+/.test(line))  { closeLists(); out.push('<h2>' + inline(line.slice(3)) + '</h2>'); }
    else if (/^#\s+/.test(line))   { closeLists(); out.push('<h1>' + inline(line.slice(2)) + '</h1>'); }
    else if (/^>\s+/.test(line))   { closeLists(); out.push('<blockquote>' + inline(line.slice(2)) + '</blockquote>'); }
    else if (/^[-*]\s+/.test(line)) {
      if (!inUl) { closeLists(); out.push('<ul>'); inUl = true; }
      out.push('<li>' + inline(line.replace(/^[-*]\s+/, '')) + '</li>');
    }
    else if (/^\d+\.\s+/.test(line)) {
      if (!inOl) { closeLists(); out.push('<ol>'); inOl = true; }
      out.push('<li>' + inline(line.replace(/^\d+\.\s+/, '')) + '</li>');
    }
    else if (line.trim() === '')   { closeLists(); }
    else                           { closeLists(); out.push('<p>' + inline(line) + '</p>'); }
  }
  closeLists();
  if (inPre) out.push('<pre><code>' + escapeHtml(preBuf.join('\n')) + '</code></pre>');
  return out.join('\n');
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso.replace(' ', 'T') + 'Z');
  if (isNaN(d)) return iso;
  const s = (Date.now() - d.getTime()) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 604800) return Math.floor(s / 86400) + 'd ago';
  return d.toLocaleDateString();
}

function initials(name) {
  if (!name) return '?';
  return name.trim().slice(0, 2).toUpperCase();
}

function diffColor(diff) {
  return { beginner: 'beg', intermediate: 'int', advanced: 'adv' }[diff] || '';

function toast(msg, kind = '') {

  t.textContent = msg;

  toast._t = setTimeout(() => { t.className = 'toast ' + kind; }, 3000);

/* ─── 2. API client ────────────────────────────────────────────────── */

// IMPORTANT — Bantu/Sua runtime limitation:
// The Bantu HTTP server (v1.2.2) is single-threaded and CRASHES SILENTLY
// when two API requests arrive at the same time (the process just exits
// with no error in the log). Browsers naturally fire many requests in
// parallel (HTML + CSS + JS + favicon + 4-5 API calls) on page load,
// which kills the server and makes courses/community/AI look "broken".
//
// Fix: serialize ALL API calls through a single global queue so the
// Bantu server only ever sees one request at a time. Static asset
// requests (/, /app.js, /styles.css, /favicon.svg) are fine because
// the static-file path is handled before the API router.

let _apiChain = Promise.resolve();
function serialize(p) {
  _apiChain = _apiChain.then(() => p().finally(() => null), () => p().finally(() => null));
  return _apiChain;
}

// Wrapper around fetch that retries on network errors (Render free-tier
// sleeps after 15 min of inactivity, so the first request after sleep may
// fail with "Failed to fetch" while the server is spinning back up).
async function fetchWithRetry(url, opts, attempts = 3, delayMs = 1500) {
  let lastErr;
  for (let i = 0; i < attempts; i++) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 20000); // 20s timeout per attempt
      const r = await fetch(url, { ...opts, signal: ctrl.signal });
      clearTimeout(t);
      return r;
    } catch (e) {
      lastErr = e;
      // Only retry on network errors (not on HTTP error responses)
      const isNetwork = e.name === 'AbortError' ||
                        e.message === 'Failed to fetch' ||
                        e.message.includes('Network') ||
                        e.message.includes('network');
      if (!isNetwork || i === attempts - 1) throw e;
      // Wait before retrying (linear backoff)
      await new Promise(res => setTimeout(res, delayMs * (i + 1)));
    }
  }
  throw lastErr;
}

const api = {
  async req(path, { method = 'GET', body, auth = false } = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (auth && state.token) headers['Authorization'] = 'Bearer ' + state.token;
    const opts = { method, headers };
    if (body !== undefined) opts.body = JSON.stringify(body);
    // Serialize: only one request in flight at a time → prevents the
    // Bantu runtime from crashing under concurrent browser requests.
    const r = await serialize(() => fetchWithRetry('/api' + path, opts).catch(e => {
      // Give a friendlier error message for cold-start failures
      const msg = e.message === 'Failed to fetch' || e.message.includes('Network')
        ? 'Server is starting up (or offline). Please wait a few seconds and try again.'
        : 'Network error: ' + e.message;
      throw new Error(msg);
    }));
    let j = null;
    try { j = await r.json(); } catch (_) { /* maybe empty body */ }
    if (!r.ok) {
      const msg = (j && (j.error || j.message)) || ('HTTP ' + r.status);
      const err = new Error(msg);
      err.status = r.status;
      err.body = j;
      throw err;
    }
    return j;
  },

  // Auth
  register: (b) => api.req('/auth/register', { method: 'POST', body: b }),
  login:    (b) => api.req('/auth/login',    { method: 'POST', body: b }),
  me:       ()  => api.req('/auth/me', { auth: true }),

  // Roadmaps
  roadmaps:        ()      => api.req('/roadmaps'),
  roadmap:         (slug)  => api.req('/roadmaps/' + slug),
  topics:          (slug)  => api.req('/roadmaps/' + slug + '/topics'),
  items:           (slug, tid) => api.req('/roadmaps/' + slug + '/topics/' + tid + '/items'),

  // Progress
  progress:        ()         => api.req('/progress', { auth: true }),
  setProgress:     (itemId, status) => api.req('/progress/' + itemId, { method: 'POST', auth: true, body: { status } }),
  removeProgress:  (itemId)   => api.req('/progress/' + itemId, { method: 'DELETE', auth: true }),

  // Notes
  notes:           ()         => api.req('/notes', { auth: true }),
  createNote:      (b)        => api.req('/notes', { method: 'POST', auth: true, body: b }),
  note:            (id)       => api.req('/notes/' + id, { auth: true }),
  updateNote:      (id, b)    => api.req('/notes/' + id, { method: 'PUT', auth: true, body: b }),
  deleteNote:      (id)       => api.req('/notes/' + id, { method: 'DELETE', auth: true }),

  // Users
  users:           ()         => api.req('/users', { auth: true }),
  updateUser:      (id, b)    => api.req('/users/' + id, { method: 'PUT', auth: true, body: b }),

  // AI
  tutor:           (msg)     => api.req('/ai/tutor', { method: 'POST', body: { message: msg } }),
  quiz:            (topic, count) => api.req('/ai/quiz', { method: 'POST', body: { topic, count } }),

  // Community — thoughts
  thoughts:        ()        => api.req('/thoughts'),
  postThought:     (b)       => api.req('/thoughts', { method: 'POST', auth: true, body: b }),
  deleteThought:   (id)      => api.req('/thoughts/' + id, { method: 'DELETE', auth: true }),
  likeThought:     (id)      => api.req('/thoughts/' + id + '/like', { method: 'POST', auth: true }),

  // Announcements
  announcements:   ()        => api.req('/announcements'),
  createAnnouncement: (b)    => api.req('/announcements', { method: 'POST', auth: true, body: b }),
  deleteAnnouncement: (id)   => api.req('/announcements/' + id, { method: 'DELETE', auth: true }),

  // Courses
  courses:         ()        => api.req('/courses'),
  course:          (id)      => api.req('/courses/' + id),
  createCourse:    (b)       => api.req('/courses', { method: 'POST', auth: true, body: b }),
  updateCourse:    (id, b)   => api.req('/courses/' + id, { method: 'PUT', auth: true, body: b }),
  deleteCourse:    (id)      => api.req('/courses/' + id, { method: 'DELETE', auth: true }),
  courseModules:   (id)      => api.req('/courses/' + id + '/modules'),
  addCourseModule: (id, b)   => api.req('/courses/' + id + '/modules', { method: 'POST', auth: true, body: b }),
  removeCourseModule: (cid, mid) => api.req('/courses/' + cid + '/modules/' + mid, { method: 'DELETE', auth: true }),

  // Enrollments
  enrollments:     ()              => api.req('/enrollments', { auth: true }),
  enroll:          (cid)           => api.req('/enrollments/' + cid, { method: 'POST', auth: true }),
  unenroll:        (cid)           => api.req('/enrollments/' + cid, { method: 'DELETE', auth: true }),
  setProgress:     (cid, percent)  => api.req('/enrollments/' + cid + '/progress', { method: 'POST', auth: true, body: { percent } }),

  // Certificates
  certificates:    ()        => api.req('/certificates', { auth: true }),
};

/* ─── 3. Auth ──────────────────────────────────────────────────────── */

function loadAuth() {
  state.token = localStorage.getItem('ms_token');
  try {
    state.user = JSON.parse(localStorage.getItem('ms_user') || 'null');
  } catch (_) { state.user = null; }
}

function saveAuth(token, user) {
  state.token = token;
  state.user = user;
  localStorage.setItem('ms_token', token);
  localStorage.setItem('ms_user', JSON.stringify(user));
  renderNavActions();
}

function clearAuth() {
  state.token = null;
  state.user = null;
  localStorage.removeItem('ms_token');
  localStorage.removeItem('ms_user');
  renderNavActions();
}

async function refreshMe() {
  if (!state.token) return;
  try {
    const j = await api.me();
    if (j.user) {
      state.user = j.user;
      localStorage.setItem('ms_user', JSON.stringify(j.user));
      renderNavActions();
    }
  } catch (e) {
    if (e.status === 401) clearAuth();
  }
}

function requireAuth() {
  if (!state.token) {
    location.hash = '#/login';
    return false;
  }
  return true;
}

/* ─── 4. Router ────────────────────────────────────────────────────── */

const routes = [
  { path: /^\/?$/,                  view: viewHome },
  { path: /^\/login\/?$/,           view: viewLogin },
  { path: /^\/register\/?$/,        view: viewLogin },
  { path: /^\/roadmaps\/?$/,        view: viewRoadmaps },
  { path: /^\/roadmap\/([^/]+)\/?$/,                view: viewRoadmapDetail },
  { path: /^\/roadmap\/([^/]+)\/topic\/(\d+)\/?$/,  view: viewTopic },
  { path: /^\/roadmap\/([^/]+)\/topic\/(\d+)\/item\/(\d+)\/?$/, view: viewLesson },
  { path: /^\/notes\/?$/,           view: viewNotes },
  { path: /^\/notes\/new\/?$/,      view: viewNoteEdit },
  { path: /^\/notes\/(\d+)\/edit\/?$/, view: viewNoteEdit },
  { path: /^\/tutor\/?$/,           view: viewTutor },
  { path: /^\/progress\/?$/,        view: viewProgress },
  { path: /^\/profile\/?$/,         view: viewProfile },
  // New in v1.1 — admin panel + community + courses + certificates
  { path: /^\/courses\/?$/,                  view: viewCourses },
  { path: /^\/course\/(\d+)\/?$/,             view: viewCourseDetail },
  { path: /^\/community\/?$/,                 view: viewCommunity },
  { path: /^\/announcements\/?$/,             view: viewAnnouncements },
  { path: /^\/certificates\/?$/,              view: viewCertificates },
  { path: /^\/admin\/?$/,                     view: viewAdmin },
];

function currentPath() {
  let h = location.hash || '#/';
  if (h.startsWith('#')) h = h.slice(1);
  if (!h.startsWith('/')) h = '/' + h;
  return h;
}

function navigate(path) {
  if (!path.startsWith('/')) path = '/' + path;
  location.hash = '#' + path;
}

async function router() {
  const path = currentPath();
  // Active nav link
  $$('.nav-links a, .bottomnav a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + path ||
                                 (path === '/' && a.getAttribute('href') === '#/roadmaps'));
  });

  // Find matching route
  let match = null, view = null;
  for (const r of routes) {
    const m = path.match(r.path);
    if (m) { match = m; view = r.view; break; }
  }

  const root = $('#view');
  root.className = 'view';
  root.innerHTML = '<div class="loading-skeleton"><span class="spinner"></span>Loading…</div>';

  if (!view) {
    root.innerHTML = '';
    root.appendChild(view404());
    return;
  }

  try {
    await view(root, ...(match.slice(1)));
  } catch (e) {
    console.error(e);
    root.innerHTML = '';
    root.appendChild(viewError(e));
  }
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ─── 5. Views ─────────────────────────────────────────────────────── */

function view404() {
  return el('div', { class: 'empty' },
    el('div', { class: 'empty-icon' }, '🧭'),
    el('h3', {}, 'Page not found'),
    el('p', {}, 'The route you tried doesn’t exist.'),
    el('a', { class: 'btn', href: '#/' }, 'Back home'),
  );
}

function viewError(e) {
  const needLogin = e.status === 401;
  const isNetwork = !e.status && (e.message.includes('starting up') || e.message.includes('Network'));
  return el('div', { class: 'empty' },
    el('div', { class: 'empty-icon' }, needLogin ? '🔒' : (isNetwork ? '⏳' : '⚠️')),
    el('h3', {}, needLogin ? 'Login required' : (isNetwork ? 'Server is waking up' : 'Something went wrong')),
    el('p', {}, e.message || 'Unknown error'),
    isNetwork
      ? el('div', { class: 'flex gap-2' },
          el('button', { class: 'btn', onclick: () => location.reload() }, 'Retry now'),
          el('a', { class: 'btn btn-ghost', href: '#/' }, 'Back home'),
        )
      : (needLogin
          ? el('a', { class: 'btn', href: '#/login' }, 'Login')
          : el('a', { class: 'btn', href: '#/' }, 'Back home')),
  );
}

function featCard(icon, title, body) {

function rmCard(r) {
  return el('a', {

async function viewRoadmaps(root) {
  if (!state.roadmaps) {
    const j = await api.roadmaps();
    state.roadmaps = j.roadmaps || [];
  }
  const all = state.roadmaps;

  const cats = Array.from(new Set(all.map(r => r.category).filter(Boolean))).sort();

  root.innerHTML = '';
  root.appendChild(
    el('div', { class: 'section-head' },
      el('div', {},
        el('h2', {}, 'All roadmaps'),
        el('p', { class: 'sub' }, all.length + ' structured learning paths across ' + cats.length + ' categories.'),
      ),
    )
  );

  // Filter bar
  const searchInput = el('input', {
    class: 'search-input',
    type: 'search',
    placeholder: 'Search roadmaps…',
    oninput: () => applyFilter(),
  });
  const chipBar = el('div', { class: 'flex gap-1 wrap' },
    el('button', {
      class: 'chip active',
      onclick: (e) => { setActiveChip(e.target); applyFilter(); },
    }, 'All'),
    ...cats.map(c => el('button', {
      class: 'chip',
      onclick: (e) => { setActiveChip(e.target); applyFilter(); },
    }, c)),
  );
  root.appendChild(el('div', { class: 'filter-bar' }, searchInput, chipBar));

  const grid = el('div', { class: 'grid grid-3' });
  root.appendChild(grid);

  function setActiveChip(b) {
    chipBar.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    b.classList.add('active');
  }
  function applyFilter() {
    const q = searchInput.value.trim().toLowerCase();
    const activeCat = chipBar.querySelector('.chip.active')?.textContent || 'All';
    const filtered = all.filter(r => {
      const matchesQ = !q || (r.title || '').toLowerCase().includes(q) || (r.description || '').toLowerCase().includes(q);
      const matchesC = activeCat === 'All' || r.category === activeCat;
      return matchesQ && matchesC;
    });
    grid.innerHTML = '';
    filtered.forEach(r => grid.appendChild(rmCard(r)));
    if (!filtered.length) {
      grid.appendChild(el('div', { class: 'empty', style: 'grid-column:1/-1' },
        el('div', { class: 'empty-icon' }, '🔍'),
        el('h3', {}, 'No roadmaps match'),
        el('p', {}, 'Try a different search or category.'),
      ));
    }
  }
  applyFilter();
}

/* ── Lesson view ──────────────────────────────────────────────────── */

async function viewLesson(root, slug, topicId, itemId) {
  let r = state.roadmapCache.get(slug);
  if (!r) {
    try {
      const j = await api.roadmap(slug);
      r = j.roadmap;
      state.roadmapCache.set(slug, r);
    } catch (_) { r = { title: 'Roadmap', icon: '📘' }; }
  }
  let items = [];
  try {
    const j = await api.items(slug, topicId);
    items = j.items || [];
  } catch (e) {
    root.innerHTML = '';
    root.appendChild(viewError(e));
    return;
  }
  const item = items.find(i => String(i.id) === String(itemId));
  if (!item) {
    root.innerHTML = '';
    root.appendChild(viewError({ message: 'Lesson not found', status: 404 }));
    return;
  }
  const idx = items.findIndex(i => String(i.id) === String(itemId));
  const prev = items[idx - 1];
  const next = items[idx + 1];

  // Existing progress
  let status = null;
  if (state.token) {
    try {
      const pj = await api.progress();
      const found = (pj.progress || []).find(p => String(p.item_id) === String(itemId));
      status = found?.status || null;
    } catch (_) {}
  }

  root.innerHTML = '';
  root.appendChild(breadcrumb('Roadmaps', '#/roadmaps', r.title, '#/roadmap/' + slug, 'Lesson'));

  const lessonCard = el('article', { class: 'lesson' },
    el('h1', {}, item.title),
    el('div', { class: 'lesson-meta' },
      (item.kind || 'lesson') + ' · topic ' + topicId + ' · lesson ' + (idx + 1) + ' of ' + items.length,
    ),
    el('div', { class: 'lesson-body', html: renderMarkdown(item.content || '*No content yet.*') }),
  );

  // Actions
  const actions = el('div', { class: 'lesson-actions' });
  if (state.token) {
    const statusBtn = el('button', {
      class: 'btn ' + (status === 'done' ? 'btn-secondary' : ''),
      onclick: async () => {
        try {
          const newStatus = status === 'done' ? 'in-progress' : 'done';
          await api.setProgress(itemId, newStatus);
          status = newStatus;
          toast(newStatus === 'done' ? 'Marked as done 🎉' : 'Marked in-progress', 'success');
          // Re-render action buttons
          lessonCard.contains(actions) && lessonCard.removeChild(actions);
          lessonCard.appendChild(buildLessonActions());
        } catch (e) { toast(e.message, 'error'); }
      },
    }, status === 'done' ? '✓ Done — click to revisit' : 'Mark as done');
    actions.appendChild(statusBtn);

    actions.appendChild(
      el('button', {
        class: 'btn btn-secondary',
        onclick: () => navigate('/notes/new?item=' + itemId + '&title=' + encodeURIComponent(item.title)),
      }, '📝 Take a note'),
    );
  } else {
    actions.appendChild(
      el('a', { class: 'btn btn-secondary', href: '#/login' }, 'Login to track progress'),
    );
  }
  // Prev / next
  if (prev) actions.appendChild(el('a', { class: 'btn btn-ghost', href: '#/roadmap/' + slug + '/topic/' + topicId + '/item/' + prev.id }, '← Previous'));
  if (next) actions.appendChild(el('a', { class: 'btn btn-ghost', href: '#/roadmap/' + slug + '/topic/' + topicId + '/item/' + next.id }, 'Next →'));
  lessonCard.appendChild(actions);

  function buildLessonActions() {
    // Same as above, rebuilt
    const a = el('div', { class: 'lesson-actions' });
    if (state.token) {
      a.appendChild(el('button', {
        class: 'btn ' + (status === 'done' ? 'btn-secondary' : ''),
        onclick: async () => {
          try {
            const ns = status === 'done' ? 'in-progress' : 'done';
            await api.setProgress(itemId, ns);
            status = ns;
            toast(ns === 'done' ? 'Marked as done 🎉' : 'Marked in-progress', 'success');
            lessonCard.removeChild(a);
            lessonCard.appendChild(buildLessonActions());
          } catch (e) { toast(e.message, 'error'); }
        },
      }, status === 'done' ? '✓ Done — click to revisit' : 'Mark as done'));
      a.appendChild(el('button', {
        class: 'btn btn-secondary',
        onclick: () => navigate('/notes/new?item=' + itemId + '&title=' + encodeURIComponent(item.title)),
      }, '📝 Take a note'));
    } else {
      a.appendChild(el('a', { class: 'btn btn-secondary', href: '#/login' }, 'Login to track progress'));
    }
    if (prev) a.appendChild(el('a', { class: 'btn btn-ghost', href: '#/roadmap/' + slug + '/topic/' + topicId + '/item/' + prev.id }, '← Previous'));
    if (next) a.appendChild(el('a', { class: 'btn btn-ghost', href: '#/roadmap/' + slug + '/topic/' + topicId + '/item/' + next.id }, 'Next →'));
    return a;
  }

  root.appendChild(lessonCard);
  root.appendChild(footerEl());
}

async function viewNoteEdit(root, noteId) {
  if (!requireAuth()) return;

  // Parse query from hash (for ?item=…&title=…)
  const queryStr = location.hash.split('?')[1] || '';
  const params = new URLSearchParams(queryStr);
  const presetItemId = params.get('item');
  const presetTitle  = params.get('title') || '';

  let note = null;
  if (noteId) {
    try {
      const j = await api.note(noteId);
      note = j.note;
    } catch (e) {
      root.innerHTML = '';
      root.appendChild(viewError(e));
      return;
    }
  }

  root.innerHTML = '';
  root.appendChild(breadcrumb('Notes', '#/notes', note ? 'Edit' : 'New'));

  const card = el('div', { class: 'card' },
    el('h2', { style: 'margin-bottom:16px' }, note ? 'Edit note' : 'New note'),
  );

  const titleInput = el('input', { type: 'text', placeholder: 'Title', value: note?.title || presetTitle });
  const bodyInput  = el('textarea', { placeholder: 'Write your note…' }, note?.body || '');
  card.appendChild(el('div', { class: 'field' }, el('label', {}, 'Title'), titleInput));
  card.appendChild(el('div', { class: 'field' }, el('label', {}, 'Body'), bodyInput));

  const actions = el('div', { class: 'flex gap-2', style: 'justify-content:flex-end;margin-top:8px' });
  actions.appendChild(el('a', { class: 'btn btn-ghost', href: '#/notes' }, 'Cancel'));
  const saveBtn = el('button', { class: 'btn' }, 'Save');
  saveBtn.onclick = async () => {
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    try {
      const body = bodyInput.value.trim();
      const title = titleInput.value.trim();
      if (!body) { toast('Note body is empty', 'error'); return; }
      if (note) {
        await api.updateNote(note.id, { title, body });
        toast('Note updated', 'success');
      } else {
        await api.createNote({ title, body, itemId: presetItemId ? Number(presetItemId) : null });
        toast('Note created', 'success');
      }
      navigate('/notes');
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save';
    }
  };
  actions.appendChild(saveBtn);
  card.appendChild(actions);

  root.appendChild(card);
}

/* ── AI Tutor ─────────────────────────────────────────────────────── */

async function viewTutor(root) {
  root.innerHTML = '';

  root.appendChild(
    el('div', { class: 'section-head' },
      el('div', {},
        el('h2', {}, 'AI Tutor'),
        el('p', { class: 'sub' }, 'Ask anything. Rule-based tutor running on Bantu — no API key, no quota.'),
      ),
    )
  );

  const messages = el('div', { class: 'chat-messages' });
  messages.appendChild(
    el('div', { class: 'msg bot' },
      el('div', { class: 'role' }, 'Tutor'),
      'Hi! I’m your AI tutor. Ask me about programming, math, science, or learning roadmaps. ' +
      'Try “how do I learn react?” or “explain recursion”.'
    )
  );

  const input = el('textarea', { placeholder: 'Ask a question…', rows: 1 });
  const sendBtn = el('button', { class: 'btn' }, 'Send');

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    messages.appendChild(
      el('div', { class: 'msg user' },
        el('div', { class: 'role' }, 'You'),
        text,
      )
    );
    messages.scrollTop = messages.scrollHeight;

    const thinking = el('div', { class: 'msg bot' },
      el('div', { class: 'role' }, 'Tutor'),
      'Thinking…',
    );
    messages.appendChild(thinking);
    messages.scrollTop = messages.scrollHeight;

    try {
      const j = await api.tutor(text);
      thinking.removeChild(thinking.lastChild);
      thinking.appendChild(document.createTextNode(j.reply || '(no reply)'));
    } catch (e) {
      thinking.removeChild(thinking.lastChild);
      thinking.appendChild(document.createTextNode('⚠️ ' + e.message));
    }
    messages.scrollTop = messages.scrollHeight;
  }

  sendBtn.onclick = send;
  input.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  };
  input.oninput = () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  };

  const chatWindow = el('div', { class: 'chat-window' },
    el('div', { class: 'chat-header' }, '💬 Chat'),
    messages,
    el('div', { class: 'chat-input' }, input, sendBtn),
  );

  // Sidebar with suggestions + quiz
  const suggestList = el('div', { class: 'suggest-list' });
  ['How do I learn react?',
   'Explain recursion like I’m 5',
   'What’s the difference between SQL and NoSQL?',
   'How do I prepare for Form 4 math exams?',
   'Teach me about variables in Python',
  ].forEach(q => suggestList.appendChild(
    el('div', { class: 'suggest-item', onclick: () => { input.value = q; send(); } }, q)
  ));

  // Mini quiz widget
  const quizTopicInput = el('input', {
    class: 'search-input',
    placeholder: 'Topic (optional)',
    style: 'margin-bottom:8px',
  });
  const quizBtn = el('button', { class: 'btn btn-secondary btn-block' }, 'Generate quiz');
  const quizOut = el('div', { style: 'margin-top:10px' });
  quizBtn.onclick = async () => {
    quizBtn.disabled = true;
    quizBtn.textContent = 'Generating…';
    quizOut.innerHTML = '';
    try {
      const j = await api.quiz(quizTopicInput.value.trim() || null, 3);
      (j.quiz || []).forEach((q, i) => {
        const block = el('div', { class: 'card', style: 'padding:14px;margin-bottom:8px' },
          el('div', { style: 'font-weight:600;margin-bottom:6px' }, (i + 1) + '. ' + q.question),
        );
        // Backend returns `choices`, but older caches may have `options` — accept both
        const opts = q.choices || q.options || [];
        opts.forEach((opt, oi) => {
          const isCorrect = q.answer === oi || q.answer === opt;
          block.appendChild(
            el('div', {
              class: 'chip',
              style: 'margin:3px;cursor:default;white-space:normal',
              onclick: (e) => {
                if (isCorrect) {
                  e.target.style.background = 'var(--ok)';
                  e.target.style.color = '#fff';
                } else {
                  e.target.style.background = 'var(--err)';
                  e.target.style.color = '#fff';
                }
              },
            }, String.fromCharCode(65 + oi) + '. ' + opt),
          );
        });
        quizOut.appendChild(block);
      });
    } catch (e) {
      quizOut.appendChild(el('div', { class: 'text-muted' }, '⚠️ ' + e.message));
    } finally {
      quizBtn.disabled = false;
      quizBtn.textContent = 'Generate quiz';
    }
  };

  const sidebar = el('aside', { class: 'tutor-sidebar card' },
    el('h3', {}, 'Try asking'),
    suggestList,
    el('h3', {}, 'Quick quiz'),
    quizTopicInput,
    quizBtn,
    quizOut,
  );

  root.appendChild(el('div', { class: 'tutor-wrap' }, chatWindow, sidebar));
}

  const done = progress.filter(p => p.status === 'done').length;
  const inProg = progress.filter(p => p.status === 'in-progress').length;
  const pending = progress.filter(p => p.status === 'pending').length;

  root.appendChild(
    el('div', { class: 'grid grid-3 mb-3' },
      el('div', { class: 'stat-card' },
        el('div', { class: 'stat-value', style: 'color:var(--ok)' }, String(done)),
        el('div', { class: 'stat-label' }, 'Completed'),
      ),
      el('div', { class: 'stat-card' },
        el('div', { class: 'stat-value', style: 'color:var(--warn)' }, String(inProg)),
        el('div', { class: 'stat-label' }, 'In progress'),
      ),
      el('div', { class: 'stat-card' },
        el('div', { class: 'stat-value' }, String(pending)),
        el('div', { class: 'stat-label' }, 'Pending'),
      ),
    )
  );

  if (!progress.length) {
    root.appendChild(
      el('div', { class: 'empty' },
        el('div', { class: 'empty-icon' }, '📈'),
        el('h3', {}, 'No progress yet'),
        el('p', {}, 'Start a roadmap and mark lessons as done to see your progress here.'),
        el('a', { class: 'btn', href: '#/roadmaps' }, 'Browse roadmaps'),
      )
    );
    return;
  }

  // List of progress rows
  const list = el('div', {});
  progress.forEach(p => {
    const status = p.status || 'pending';
    const statusClass = status === 'done' ? 'beg' : status === 'in-progress' ? 'int' : '';
    list.appendChild(
      el('div', { class: 'card mb-1', style: 'padding:14px 18px;display:flex;align-items:center;gap:12px' },
        el('span', { class: 'badge ' + statusClass }, status),
        el('div', { class: 'flex-1' },
          el('div', { style: 'font-weight:600' }, p.item_title || ('Item #' + p.item_id)),
          el('div', { class: 'text-xs text-muted' }, 'Updated ' + timeAgo(p.updated_at)),
        ),
        el('button', {
          class: 'btn btn-ghost btn-sm',
          onclick: async () => {
            try {
              await api.removeProgress(p.item_id);
              toast('Progress cleared', 'success');
              viewProgress(root);
            } catch (e) { toast(e.message, 'error'); }
          },
        }, '✕ Clear'),
      )
    );
  });
  root.appendChild(list);
}

async function viewProfile(root) {
  if (!requireAuth()) return;
  const u = state.user || {};

  root.innerHTML = '';
  root.appendChild(
    el('div', { class: 'profile-header' },
      el('div', { class: 'avatar-lg' }, initials(u.display_name || u.username || 'U')),
      el('div', {},
        el('h1', {}, u.display_name || u.username || 'User'),
        el('div', { class: 'meta' }, '@' + (u.username || '') + ' · ' + (u.email || '')),
        el('div', { class: 'meta mt-1' }, 'Role: ' + (u.role || 'student') + ' · Joined ' + timeAgo(u.created_at)),
      ),
    )
  );

  // Edit form
  const card = el('div', { class: 'card' }, el('h2', {}, 'Edit profile'));
  const nameInput = el('input', { type: 'text', value: u.display_name || '' });
  const bioInput  = el('textarea', { placeholder: 'Tell us about yourself…' }, u.bio || '');
  const avatarInput = el('input', { type: 'text', placeholder: 'https://…', value: u.avatar_url || '' });
  card.appendChild(el('div', { class: 'field' }, el('label', {}, 'Display name'), nameInput));
  card.appendChild(el('div', { class: 'field' }, el('label', {}, 'Bio'), bioInput));
  card.appendChild(el('div', { class: 'field' }, el('label', {}, 'Avatar URL'), avatarInput));
  const saveBtn = el('button', { class: 'btn' }, 'Save');
  saveBtn.onclick = async () => {
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    try {
      const j = await api.updateUser(u.id, {
        display_name: nameInput.value.trim(),
        bio: bioInput.value.trim(),
        avatar_url: avatarInput.value.trim(),
      });
      if (j.user) {
        state.user = j.user;
        localStorage.setItem('ms_user', JSON.stringify(j.user));
        renderNavActions();
      }
      toast('Profile saved', 'success');
      viewProfile(root);
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save';
    }
  };
  card.appendChild(saveBtn);
  root.appendChild(card);

  // Logout
  const logoutCard = el('div', { class: 'card mt-3' },
    el('h2', {}, 'Session'),
    el('p', { class: 'text-muted' }, 'You’re logged in. Logging out clears your local token but keeps your data on the server.'),
    el('button', {
      class: 'btn btn-danger',
      onclick: () => {
        clearAuth();
        toast('Logged out', 'success');
        navigate('/');
      },
    }, 'Log out'),
  );
  root.appendChild(logoutCard);
}

async function viewCourseDetail(root, courseId) {
  root.classList.add('view-course-detail');
  let data;
  try {
    data = await api.course(courseId);
  } catch (e) { root.innerHTML = ''; root.appendChild(viewError(e)); return; }
  const c = data.course;
  const modules = data.modules || [];

  root.appendChild(el('a', { class: 'back-link', href: '#/courses' }, '← Back to courses'));
  const color = c.thumbnail_color || '#6366f1';

  root.appendChild(el('div', { class: 'course-hero', style: '--accent:' + color },
    el('div', { class: 'course-hero-tags' },
      el('span', { class: 'pill pill-' + diffColor(c.difficulty) }, c.difficulty || 'beginner'),
      el('span', { class: 'pill' }, c.category || 'General'),
    ),
    el('h1', {}, c.title),
    el('p', { class: 'course-hero-desc' }, c.description || ''),
    el('div', { class: 'course-hero-meta' },
      el('span', {}, '⏱ ' + (c.duration_hours || 0) + ' hours'),
      el('span', {}, '👤 ' + escapeHtml(c.instructor || c.author || 'modifiedS')),
      el('span', {}, '📦 ' + modules.length + ' module' + (modules.length === 1 ? '' : 's')),
    ),
  ));

  // Enrollment + progress
  let enrollment = null;
  if (state.token) {
    try {
      const en = await api.enrollments();
      enrollment = (en.enrollments || []).find(e => String(e.course_id) === String(courseId));
    } catch (_) {}
  }

  const actionsBar = el('div', { class: 'course-actions' });
  if (!state.token) {
    actionsBar.appendChild(el('a', { class: 'btn', href: '#/login' }, 'Login to enroll'));
  } else if (!enrollment) {
    const btn = el('button', { class: 'btn', onclick: async () => {
      try { await api.enroll(courseId); toast('Enrolled! Good luck 🎯'); router(); }
      catch (e) { toast(e.message, 'error'); }
    }}, 'Enroll now');
    actionsBar.appendChild(btn);
  } else {
    const pct = enrollment.progress_percent || 0;
    actionsBar.appendChild(el('div', { class: 'progress-inline' },
      el('div', { class: 'progress-bar' },
        el('div', { class: 'progress-bar-fill', style: 'width:' + pct + '%' }),
      ),
      el('span', { class: 'progress-pct' }, pct + '%'),
    ));
    if (pct < 100) {
      const pctInput = el('input', { type: 'range', min: '0', max: '100', value: String(pct), style: 'width:220px' });
      pctInput.addEventListener('change', async () => {
        try {
          const r = await api.setProgress(courseId, parseInt(pctInput.value, 10));
          toast('Progress saved: ' + pctInput.value + '%');
          if (r.certificate) {
            toast('🎉 Course complete! Your certificate is ready.', 'success');
          }
          router();
        } catch (e) { toast(e.message, 'error'); }
      });
      actionsBar.appendChild(pctInput);
      actionsBar.appendChild(el('span', { class: 'muted' }, 'Mark my progress'));
    } else {
      actionsBar.appendChild(el('span', { class: 'pill pill-success' }, '✓ Completed'));
      actionsBar.appendChild(el('a', { class: 'btn btn-ghost', href: '#/certificates' }, 'View certificate →'));
    }
    const unenrollBtn = el('button', { class: 'btn btn-ghost btn-sm', onclick: async () => {
      if (!confirm('Unenroll from this course? Your progress will be lost.')) return;
      try { await api.unenroll(courseId); toast('Unenrolled'); router(); }
      catch (e) { toast(e.message, 'error'); }
    }}, 'Unenroll');
    actionsBar.appendChild(unenrollBtn);
  }
  root.appendChild(actionsBar);

  // Modules
  root.appendChild(el('h2', { class: 'section-title' }, 'Course content'));
  if (modules.length === 0) {
    root.appendChild(el('div', { class: 'empty' },
      el('p', {}, 'No modules yet. Check back soon.'),
    ));
  } else {
    const list = el('div', { class: 'module-list' });
    modules.forEach((m, i) => {
      list.appendChild(el('details', { class: 'module-item' },
        el('summary', {},
          el('span', { class: 'module-num' }, String(i + 1).padStart(2, '0')),
          el('span', { class: 'module-title' }, m.title),
        ),
        el('div', { class: 'module-content', html: renderMarkdown(m.content || '') }),
      ));
    });
    root.appendChild(list);
  }
}

/** Opens a new window with a printable certificate HTML and triggers print dialog.

  w.document.write(`<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
